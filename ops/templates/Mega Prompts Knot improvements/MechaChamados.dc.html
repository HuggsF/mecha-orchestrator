<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:absolute;inset:0;overflow:auto;padding:18px;background:var(--bg)">
  <div style="display:flex;gap:14px;align-items:flex-start;min-width:max-content">
    <sc-for list="{{ vm.board }}" as="col" hint-placeholder-count="4">
      <div style="width:240px;flex:none;background:var(--bg-2);border:1px solid var(--border-2);border-radius:8px">
        <div style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px"><span style="width:8px;height:8px;border-radius:50%;background:{{ col.dot }}"></span><span style="font-size:12.5px;font-weight:600">{{ col.name }}</span><span style="margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-faint)">{{ col.n }}</span></div>
        <div style="padding:9px;display:flex;flex-direction:column;gap:8px">
          <sc-for list="{{ col.cards }}" as="c" hint-placeholder-count="2"><div onClick="{{ c.open }}" style="background:var(--bg-3);border:1px solid var(--border-2);border-left:3px solid {{ c.color }};border-radius:6px;padding:9px 10px;cursor:pointer" style-hover="border-color:#555"><div style="font-family:var(--mono);font-size:10.5px;color:var(--ink-dim);margin-bottom:3px">{{ c.proto }}</div><div style="font-size:12.5px;line-height:1.35;margin-bottom:7px">{{ c.title }}</div><div style="display:flex;gap:5px;flex-wrap:wrap;align-items:center"><span style="background:#262626;color:{{ c.slaC }};border:1px solid #3a3a3a;border-radius:4px;font-size:10px;padding:1px 6px;font-family:var(--mono)">{{ c.sla }}</span><span style="background:#242424;color:var(--ink-dim);border-radius:4px;font-size:10px;padding:1px 6px">{{ c.conc }}</span><sc-if value="{{ c.canAdv }}" hint-placeholder-val="{{ false }}"><button onClick="{{ c.adv }}" title="Avançar etapa" style="margin-left:auto;border:1px solid #3a3a3a;background:transparent;color:var(--ink-dim);border-radius:4px;font-size:11px;padding:0 7px;cursor:pointer;font-family:var(--mono)" style-hover="color:#fff;border-color:#555">→</button></sc-if></div></div></sc-for>
        </div>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:520},&quot;vm&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
