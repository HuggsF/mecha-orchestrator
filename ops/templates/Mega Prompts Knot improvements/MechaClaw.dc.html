<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:absolute;inset:0;overflow:auto;padding:22px;background:var(--bg)">
  <div style="max-width:880px;display:flex;flex-direction:column;gap:20px">

    <!-- See-Think-Act loop -->
    <div style="background:var(--bg-2);border:1px solid var(--border-2);border-radius:12px;padding:20px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-family:var(--mono)">Loop See · Think · Act</span><span style="font-family:var(--mono);font-size:11px;color:var(--green);margin-left:auto">running · ciclo {{ vm.step }}/15</span></div>
      <div style="display:flex;align-items:stretch;gap:0;flex-wrap:wrap">
        <sc-for list="{{ vm.phases }}" as="p" hint-placeholder-count="3">
          <div style="flex:1 1 150px;min-width:0;background:{{ p.bg }};border:1px solid {{ p.border }};border-radius:10px;padding:15px 16px;transition:all .4s;box-shadow:{{ p.glow }}">
            <div style="display:flex;align-items:center;gap:9px;margin-bottom:8px"><span style="font-size:20px">{{ p.icon }}</span><span style="font-size:14px;font-weight:700;color:{{ p.titleC }}">{{ p.name }}</span><sc-if value="{{ p.active }}" hint-placeholder-val="{{ false }}"><span style="margin-left:auto;width:8px;height:8px;border-radius:50%;background:{{ p.dot }};box-shadow:0 0 8px {{ p.dot }};animation:pulse 1.1s infinite"></span></sc-if></div>
            <div style="font-size:12px;color:{{ p.descC }};line-height:1.45">{{ p.desc }}</div>
          </div>
          <sc-if value="{{ p.arrow }}" hint-placeholder-val="{{ true }}"><div style="display:flex;align-items:center;padding:0 8px;color:{{ p.arrowC }};font-size:18px">→</div></sc-if>
        </sc-for>
      </div>
      <div style="margin-top:15px;background:#141414;border:1px solid #2a2a2a;border-radius:8px;padding:11px 13px;font-family:var(--mono);font-size:11.5px;color:var(--ink-dim);display:flex;align-items:center;gap:9px"><span style="color:var(--green)">▸</span><span style="color:var(--ink)">{{ vm.action }}</span><span style="margin-left:auto;color:var(--ink-faint)">→ {{ vm.target }}</span></div>
    </div>

    <!-- telemetry cards -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px">
      <sc-for list="{{ vm.cards }}" as="c" hint-placeholder-count="6"><div style="background:var(--bg-2);border:1px solid var(--border-2);border-top:3px solid {{ c.color }};border-radius:8px;padding:16px"><div style="font-size:22px;margin-bottom:8px">{{ c.icon }}</div><div style="font-size:13px;font-weight:600;margin-bottom:4px">{{ c.label }}</div><div style="font-family:var(--mono);font-size:18px;color:{{ c.color }};margin-bottom:4px">{{ c.value }}</div><div style="font-size:11px;color:var(--ink-dim);line-height:1.4">{{ c.note }}</div></div></sc-for>
    </div>
    <div style="font-size:11px;color:var(--ink-faint);font-family:var(--mono)">⚠ Telemetria simulada (demo) — o loop real roda em execution/claw_loop.py.</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:880,&quot;height&quot;:560},&quot;vm&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
