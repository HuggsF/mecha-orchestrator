<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:absolute;inset:0;overflow:auto;padding:22px;background:var(--bg)">
  <div style="max-width:760px;display:flex;flex-direction:column;gap:22px">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="display:flex;gap:6px"><sc-for list="{{ vm.tabs }}" as="it" hint-placeholder-count="2"><button onClick="{{ it.sel }}" style="border:1px solid {{ it.border }};background:{{ it.bg }};color:{{ it.color }};border-radius:999px;padding:5px 14px;font-size:12px;cursor:pointer;font-family:var(--mono)" style-hover="border-color:#555">{{ it.label }}</button></sc-for></div>
      <span style="font-size:11px;color:var(--ink-faint);margin-left:4px">clique num serviço p/ inspecionar</span>
    </div>
    <sc-for list="{{ vm.zones }}" as="z" hint-placeholder-count="2">
      <div>
        <div style="font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-faint);font-family:var(--mono);margin-bottom:11px">{{ z.zone }}</div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:14px">
          <sc-for list="{{ z.items }}" as="s" hint-placeholder-count="4"><div onClick="{{ s.ping }}" style="background:var(--bg-2);border:1px solid var(--border-2);border-radius:8px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer" style-hover="border-color:#555"><span style="width:14px;height:14px;border-radius:50%;background:{{ s.dot }};box-shadow:0 0 9px {{ s.dot }}"></span><div style="flex:1"><div style="font-size:14px;font-weight:600">{{ s.name }}</div><div style="font-size:11px;color:var(--ink-faint);font-family:var(--mono)">{{ s.port }}</div></div><span style="font-family:var(--mono);font-size:12px;color:{{ s.color }}">{{ s.state }}</span></div></sc-for>
        </div>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:520},&quot;vm&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
