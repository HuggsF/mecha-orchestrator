<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="height:100%;display:flex;flex-direction:column;background:#0e0e0e">
  <div style="height:36px;flex:none;display:flex;align-items:center;border-bottom:1px solid #1c1c1c;padding:0 4px 0 10px;background:#141414">
    <span style="display:flex;align-items:center;gap:6px;margin-right:8px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase"><span style="width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)"></span>Painel</span>
    <sc-for list="{{ vm.tabs }}" as="p" hint-placeholder-count="3"><button onClick="{{ p.sel }}" style="border:0;background:{{ p.tabBg }};border-bottom:2px solid {{ p.line }};color:{{ p.color }};cursor:pointer;font-size:11px;padding:0 13px;height:36px;text-transform:uppercase;letter-spacing:.04em" style-hover="color:#fff">{{ p.label }}<sc-if value="{{ p.badge }}" hint-placeholder-val="{{ false }}"><span style="margin-left:6px;background:var(--amber);color:#1a1a1a;border-radius:8px;font-size:9px;padding:0 5px;font-family:var(--mono)">{{ p.badge }}</span></sc-if></button></sc-for>
    <span style="margin-left:auto;display:flex;align-items:center;gap:2px">
      <span style="font-family:var(--mono);font-size:10px;color:var(--ink-faint);margin-right:6px">.mecha · zsh</span>
      <button onClick="{{ vm.toggle }}" title="{{ vm.toggleTitle }}" style="border:0;background:transparent;color:var(--ink-faint);cursor:pointer;font-size:15px;width:28px;height:28px;border-radius:6px;line-height:1" style-hover="background:#262626;color:#fff">{{ vm.chevron }}</button>
    </span>
  </div>
  <sc-if value="{{ vm.open }}" hint-placeholder-val="{{ true }}">
  <div style="flex:1;overflow:auto;padding:10px 14px;font-family:var(--mono);font-size:12px;line-height:1.65;background:#0e0e0e">
    <sc-for list="{{ vm.lines }}" as="l" hint-placeholder-count="7"><div style="white-space:pre-wrap;word-break:break-word"><span style="color:{{ l.tcolor }}">{{ l.tag }}</span> <span style="color:{{ l.color }}">{{ l.text }}</span></div></sc-for>
    <div style="display:flex;align-items:center;gap:8px;margin-top:6px"><span style="color:var(--green)">mecha@workbench</span><span style="color:var(--ink-faint)">:</span><span style="color:var(--cyan)">~/.mecha</span><span style="color:var(--ink-dim)">$</span><span style="width:8px;height:15px;background:#cfcfcf;display:inline-block;animation:pulse 1.1s infinite"></span></div>
  </div>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:760,&quot;height&quot;:184},&quot;vm&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;any&quot;}}"></script>
</body>
</html>
