  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ground:var(--bg);font-family:var(--sans);color:var(--ink)\">\n\n  <!-- ===== TEAMS-LIKE APP HEADER ===== -->\n  <header style=\"background:var(--violet);color:#fff;padding:0 18px;display:flex;align-items:center;gap:16px;height:48px;position:sticky;top:0;z-index:50\">\n    <div style=\"display:flex;align-items:center;gap:10px\">\n      <div style=\"width:26px;height:26px;border-radius:6px;background:#fff;color:var(--violet);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;font-family:var(--mono)\">M<\u002Fdiv>\n      <div style=\"line-height:1.1\"><div style=\"font-weight:600;font-size:14px;letter-spacing:.01em\">Mendas Studio<\u002Fdiv><div style=\"font-size:10px;opacity:.8\">Bot de Chamados · Telegram<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.13);padding:3px;border-radius:8px;margin-left:8px\">\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ t.sel }}\" style=\"background:{{ t.bg }};color:{{ t.color }};border:0;padding:6px 14px;border-radius:6px;cursor:pointer;font-weight:600;font-size:12.5px;display:flex;align-items:center;gap:7px\">{{ t.icon }} {{ t.label }}<sc-if value=\"{{ t.count }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"background:{{ t.badgeBg }};color:{{ t.badgeColor }};border-radius:10px;padding:0 6px;font-size:10px;font-weight:700\">{{ t.count }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"margin-left:auto;display:flex;align-items:center;gap:12px;font-size:11.5px\">\n      <button onclick=\"{{ stepDay }}\" style=\"background:rgba(255,255,255,.15);color:#fff;border:0;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:600\">⏩ +1 dia útil <span style=\"opacity:.75\">· D+{{ day }}<\u002Fspan><\u002Fbutton>\n      <button onclick=\"{{ toggleNotes }}\" style=\"background:{{ notesBtnBg }};color:{{ notesBtnColor }};border:0;padding:6px 12px;border-radius:6px;cursor:pointer;font-weight:600\">◈ Anotações UX<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ===== BODY GRID ===== -->\n  <div style=\"display:grid;grid-template-columns:1fr 348px;gap:0;align-items:start\">\n\n    <!-- ====== MAIN ====== -->\n    <main style=\"padding:22px 24px 70px;min-height:calc(100vh - 48px)\">\n\n      <!-- ===== TAB: BOT / NOVO CHAMADO ===== -->\n      <sc-if value=\"{{ isBot }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"max-width:760px;margin:0 auto\">\n          <div style=\"display:flex;align-items:center;gap:12px;background:var(--violet);color:#fff;padding:11px 16px;border-radius:14px 14px 0 0\">\n            <div style=\"width:40px;height:40px;border-radius:50%;background:#fff;color:var(--violet);display:flex;align-items:center;justify-content:center;font-weight:700;font-family:var(--mono);font-size:18px\">M<\u002Fdiv>\n            <div style=\"line-height:1.2\"><div style=\"font-weight:600;font-size:14px\">Mendas Chamados Bot<\u002Fdiv><div style=\"font-size:11px;opacity:.85\">bot · online<\u002Fdiv><\u002Fdiv>\n            <span style=\"margin-left:auto;font-family:var(--mono);font-size:11px;opacity:.8\">@mendas_chamados_bot<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"background:#cdd9e3;background-image:radial-gradient(circle at 18% 25%,rgba(255,255,255,.55) 0 2px,transparent 2px),radial-gradient(circle at 72% 65%,rgba(255,255,255,.4) 0 2px,transparent 2px);background-size:46px 46px;border:1px solid var(--border);border-top:0;border-radius:0 0 14px 14px;padding:18px 16px;display:flex;flex-direction:column;gap:14px\">\n\n          <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:var(--note-bg);border:1px dashed var(--note-bd);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--note);display:flex;gap:9px;align-items:flex-start\">\n              <span style=\"font-weight:700\">◈ UX<\u002Fspan><span><strong>SSOT no Telegram.<\u002Fstrong> O bot é o único canal oficial de abertura — e-mail, WhatsApp ou conversa solta não iniciam SLA. Tudo entra por um fluxo estruturado, garantindo briefing mínimo desde a origem.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- bot greeting -->\n          <div style=\"display:flex;gap:11px;align-items:flex-start\">\n            <div style=\"width:34px;height:34px;border-radius:50%;background:var(--violet);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex:none;font-family:var(--mono)\">M<\u002Fdiv>\n            <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:4px 14px 14px 14px;padding:13px 15px;max-width:560px\">\n              <div style=\"font-weight:600;font-size:12px;color:var(--violet);margin-bottom:3px\">Mendas Bot <span style=\"color:var(--ink-faint);font-weight:400\">· /start<\u002Fspan><\u002Fdiv>\n              <div style=\"font-size:13.5px;color:var(--ink)\">Olá! Para abrir um chamado, escolha a <strong>categoria de esforço<\u002Fstrong> abaixo (ou envie <span style=\"font-family:var(--mono);color:var(--violet)\">/sla<\u002Fspan> para vê-las todas). Eu valido o briefing, registro na esteira e inicio o SLA.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- adaptive card: novo chamado -->\n          <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(20,22,40,.05)\">\n            <div style=\"background:var(--surface-2);border-bottom:1px solid var(--border);padding:11px 16px;display:flex;align-items:center;gap:9px\">\n              <span style=\"width:8px;height:8px;border-radius:2px;background:var(--violet)\"><\u002Fspan>\n              <span style=\"font-weight:600;font-size:13px\">/novo · abrir chamado<\u002Fspan>\n              <span style=\"margin-left:auto;font-size:11px;color:var(--ink-faint);font-family:var(--mono)\">hook:intake<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"padding:16px;display:flex;flex-direction:column;gap:14px\">\n              <label style=\"display:block\"><span style=\"font-size:12px;font-weight:600;color:var(--ink-dim)\">Título da demanda<\u002Fspan>\n                <input value=\"{{ fTitulo }}\" oninput=\"{{ onTitulo }}\" placeholder=\"ex: Campanha Maio Amarelo — pacote de artes\" style=\"display:block;width:100%;margin-top:6px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:7px;padding:9px 11px\" style-focus=\"border-color:var(--violet)\"><\u002Flabel>\n\n              <div>\n                <span style=\"font-size:12px;font-weight:600;color:var(--ink-dim)\">Categoria de esforço <span style=\"font-weight:400;color:var(--ink-faint)\">· define o SLA<\u002Fspan><\u002Fspan>\n                <div style=\"display:flex;flex-direction:column;gap:6px;margin-top:7px\">\n                  <sc-for list=\"{{ catOptions }}\" as=\"c\" hint-placeholder-count=\"5\">\n                    <button onclick=\"{{ c.sel }}\" style=\"text-align:left;background:{{ c.bg }};border:1px solid {{ c.border }};border-radius:8px;padding:9px 12px;cursor:pointer;display:flex;align-items:center;gap:11px\" style-hover=\"border-color:var(--violet)\">\n                      <span style=\"font-family:var(--mono);font-weight:700;font-size:15px;color:{{ c.numColor }};min-width:48px\">{{ c.dias }}d<\u002Fspan>\n                      <span style=\"flex:1\"><span style=\"font-weight:600;font-size:13px;color:var(--ink)\">{{ c.nome }}<\u002Fspan><span style=\"display:block;font-size:11px;color:var(--ink-dim);margin-top:1px\">{{ c.desc }}<\u002Fspan><\u002Fspan>\n                      <sc-if value=\"{{ c.active }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:var(--violet);font-weight:700\">✓<\u002Fspan><\u002Fsc-if>\n                    <\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n\n              <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:12px\">\n                <label style=\"display:block\"><span style=\"font-size:12px;font-weight:600;color:var(--ink-dim)\">Concessão / unidade<\u002Fspan>\n                  <select onchange=\"{{ onConcessao }}\" style=\"display:block;width:100%;margin-top:6px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:7px;padding:9px 11px;cursor:pointer\">\n                    <sc-for list=\"{{ concessoes }}\" as=\"o\" hint-placeholder-count=\"5\"><option value=\"{{ o }}\">{{ o }}<\u002Foption><\u002Fsc-for>\n                  <\u002Fselect><\u002Flabel>\n                <label style=\"display:block\"><span style=\"font-size:12px;font-weight:600;color:var(--ink-dim)\">Canal de veiculação<\u002Fspan>\n                  <select onchange=\"{{ onCanal }}\" style=\"display:block;width:100%;margin-top:6px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:7px;padding:9px 11px;cursor:pointer\">\n                    <sc-for list=\"{{ canais }}\" as=\"o\" hint-placeholder-count=\"6\"><option value=\"{{ o }}\">{{ o }}<\u002Foption><\u002Fsc-for>\n                  <\u002Fselect><\u002Flabel>\n              <\u002Fdiv>\n\n              <label style=\"display:block\"><span style=\"font-size:12px;font-weight:600;color:var(--ink-dim)\">Briefing <span style=\"font-weight:400;color:var(--ink-faint)\">· texto, objetivo, formato e referências<\u002Fspan><\u002Fspan>\n                <textarea value=\"{{ fBriefing }}\" oninput=\"{{ onBriefing }}\" rows=\"3\" placeholder=\"Descreva o objetivo, a mensagem-chave, formato desejado e referências.\" style=\"display:block;width:100%;margin-top:6px;background:var(--surface-2);border:1px solid var(--border-2);border-radius:7px;padding:9px 11px;resize:vertical;font-family:inherit\"><\u002Ftextarea>\n                <div style=\"font-size:11px;color:{{ briefHintColor }};margin-top:4px\">{{ briefHint }}<\u002Fdiv><\u002Flabel>\n\n              <label style=\"display:flex;align-items:center;gap:10px;cursor:pointer;background:{{ urgBg }};border:1px solid {{ urgBorder }};border-radius:8px;padding:10px 12px\">\n                <input type=\"checkbox\" checked=\"{{ fUrgente }}\" onchange=\"{{ onUrgente }}\" style=\"width:16px;height:16px;accent-color:var(--breach);cursor:pointer\">\n                <span style=\"flex:1\"><span style=\"font-weight:600;font-size:13px;color:{{ urgInk }}\">Demanda urgente (fluxo de exceção)<\u002Fspan><span style=\"display:block;font-size:11px;color:var(--ink-dim)\">Validação obrigatória via Telegram. Reprioriza a fila da sua área.<\u002Fspan><\u002Fspan>\n              <\u002Flabel>\n\n              <div style=\"display:flex;align-items:center;gap:12px;border-top:1px solid var(--border);padding-top:13px\">\n                <div style=\"font-size:12px;color:var(--ink-dim)\">SLA estimado: <strong style=\"color:var(--violet);font-family:var(--mono)\">{{ slaPreview }}<\u002Fstrong><\u002Fdiv>\n                <button onclick=\"{{ openTicket }}\" style=\"margin-left:auto;background:var(--violet);color:#fff;border:0;border-radius:8px;padding:11px 22px;cursor:pointer;font-weight:600;font-size:13.5px\" style-hover=\"background:var(--violet-d)\">Abrir chamado →<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:var(--note-bg);border:1px dashed var(--note-bd);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--note);display:flex;gap:9px;align-items:flex-start\">\n              <span style=\"font-weight:700\">◈ UX<\u002Fspan><span><strong>Corte 16h.<\u002Fstrong> Chamados abertos após as 16h têm o SLA iniciado no próximo dia útil — o bot avisa isso na confirmação para alinhar expectativa de prazo já na abertura.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n          <!-- bot thread (confirmations) -->\n          <sc-for list=\"{{ thread }}\" as=\"m\" hint-placeholder-count=\"0\">\n            <div style=\"display:flex;gap:11px;align-items:flex-start\">\n              <div style=\"width:34px;height:34px;border-radius:50%;background:var(--emerald);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;flex:none;font-family:var(--mono)\">✓<\u002Fdiv>\n              <div style=\"background:var(--emerald-l);border:1px solid #bfe3cd;border-radius:4px 12px 12px 12px;padding:13px 15px;flex:1\">\n                <div style=\"font-weight:600;font-size:12px;color:var(--emerald);margin-bottom:5px\">Chamado registrado · <span style=\"font-family:var(--mono)\">{{ m.protocolo }}<\u002Fspan><\u002Fdiv>\n                <div style=\"font-size:13.5px;color:var(--ink);margin-bottom:8px\">{{ m.titulo }}<\u002Fdiv>\n                <div style=\"display:flex;flex-wrap:wrap;gap:7px;font-size:11.5px\">\n                  <span style=\"background:#fff;border:1px solid #bfe3cd;border-radius:6px;padding:3px 9px;font-family:var(--mono)\">{{ m.cat }}d · {{ m.catNome }}<\u002Fspan>\n                  <span style=\"background:#fff;border:1px solid #bfe3cd;border-radius:6px;padding:3px 9px\">{{ m.concessao }}<\u002Fspan>\n                  <span style=\"background:#fff;border:1px solid #bfe3cd;border-radius:6px;padding:3px 9px\">Prazo: <strong>{{ m.deadline }}<\u002Fstrong><\u002Fspan>\n                  <sc-if value=\"{{ m.urgente }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"background:var(--breach-l);border:1px solid #eab8c2;color:var(--breach);border-radius:6px;padding:3px 9px;font-weight:600\">⚡ URGENTE<\u002Fspan><\u002Fsc-if>\n                <\u002Fdiv>\n                <div style=\"font-size:11.5px;color:var(--ink-dim);margin-top:9px\">{{ m.note }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:4px\">\n            <span style=\"background:#fff;border:1px solid var(--border-2);border-radius:999px;padding:7px 14px;font-family:var(--mono);font-size:12px;color:var(--violet);font-weight:600\">/novo<\u002Fspan>\n            <span style=\"background:#fff;border:1px solid var(--border-2);border-radius:999px;padding:7px 14px;font-family:var(--mono);font-size:12px;color:var(--violet);font-weight:600\">/sla<\u002Fspan>\n            <span style=\"background:#fff;border:1px solid var(--border-2);border-radius:999px;padding:7px 14px;font-family:var(--mono);font-size:12px;color:var(--violet);font-weight:600\">/status<\u002Fspan>\n            <span style=\"background:#fff;border:1px solid var(--border-2);border-radius:999px;padding:7px 14px;font-family:var(--mono);font-size:12px;color:var(--breach);font-weight:600\">/urgente<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:10px;margin-top:10px;background:#fff;border:1px solid var(--border-2);border-radius:999px;padding:11px 16px;color:var(--ink-faint);font-size:13px\">Mensagem ao bot…<span style=\"margin-left:auto;color:var(--violet);font-weight:700;font-size:16px\">➤<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== TAB: ESTEIRA (BOARD) ===== -->\n      <sc-if value=\"{{ isBoard }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:14px\">\n            <h2 style=\"font-size:17px;font-weight:700\">Esteira de produção<\u002Fh2>\n            <span style=\"font-size:12px;color:var(--ink-dim)\">fluxo Planner · {{ ticketCount }} chamados ativos<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:var(--note-bg);border:1px dashed var(--note-bd);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--note);margin-bottom:14px;display:flex;gap:9px\"><span style=\"font-weight:700\">◈ UX<\u002Fspan><span><strong>Estados visíveis.<\u002Fstrong> A esteira espelha o ciclo de vida do chamado. <strong>Triagem<\u002Fstrong> não conta SLA até o briefing estar completo; <strong>On Hold<\u002Fstrong> congela o relógio quando o solicitante não responde em 2 dias úteis e a tarefa perde prioridade.<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:grid;grid-template-columns:repeat(6,minmax(186px,1fr));gap:11px;overflow-x:auto;padding-bottom:8px\">\n            <sc-for list=\"{{ columns }}\" as=\"col\" hint-placeholder-count=\"6\">\n              <div style=\"background:var(--surface-3);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;min-height:140px\">\n                <div style=\"padding:10px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)\">\n                  <span style=\"width:9px;height:9px;border-radius:50%;background:{{ col.dot }}\"><\u002Fspan>\n                  <span style=\"font-weight:600;font-size:12.5px\">{{ col.name }}<\u002Fspan>\n                  <span style=\"margin-left:auto;background:#fff;border:1px solid var(--border-2);border-radius:9px;font-size:10.5px;padding:0 7px;color:var(--ink-dim);font-family:var(--mono)\">{{ col.n }}<\u002Fspan>\n                <\u002Fdiv>\n                <div style=\"padding:9px;display:flex;flex-direction:column;gap:9px\">\n                  <sc-for list=\"{{ col.tickets }}\" as=\"tk\" hint-placeholder-count=\"0\">\n                    <div style=\"background:#fff;border:1px solid var(--border-2);border-left:3px solid {{ tk.slaColor }};border-radius:8px;padding:10px 11px\">\n                      <div style=\"display:flex;align-items:center;gap:6px;margin-bottom:5px\">\n                        <span style=\"font-family:var(--mono);font-size:10.5px;color:var(--ink-faint)\">{{ tk.protocolo }}<\u002Fspan>\n                        <sc-if value=\"{{ tk.urgente }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"color:var(--breach);font-size:11px\">⚡<\u002Fspan><\u002Fsc-if>\n                        <span style=\"margin-left:auto;font-family:var(--mono);font-size:10.5px;font-weight:700;color:{{ tk.slaColor }}\">{{ tk.slaTag }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"font-size:12.5px;font-weight:600;line-height:1.3;margin-bottom:6px\">{{ tk.titulo }}<\u002Fdiv>\n                      <div style=\"display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px\">\n                        <span style=\"background:var(--violet-l);color:var(--violet-d);border-radius:5px;font-size:10px;padding:2px 6px;font-weight:600;font-family:var(--mono)\">{{ tk.cat }}d<\u002Fspan>\n                        <span style=\"background:var(--surface-2);border:1px solid var(--border);border-radius:5px;font-size:10px;padding:2px 6px;color:var(--ink-dim)\">{{ tk.concessao }}<\u002Fspan>\n                      <\u002Fdiv>\n                      <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n                        <sc-for list=\"{{ tk.actions }}\" as=\"a\" hint-placeholder-count=\"0\">\n                          <button onclick=\"{{ a.fn }}\" style=\"background:{{ a.bg }};color:{{ a.color }};border:1px solid {{ a.border }};border-radius:6px;padding:5px 9px;cursor:pointer;font-size:11px;font-weight:600\" style-hover=\"filter:brightness(.97)\">{{ a.label }}<\u002Fbutton>\n                        <\u002Fsc-for>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                  <sc-if value=\"{{ col.empty }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-size:11px;color:var(--ink-faint);text-align:center;padding:14px 4px\">—<\u002Fdiv><\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== TAB: CALENDÁRIO EDITORIAL ===== -->\n      <sc-if value=\"{{ isCal }}\" hint-placeholder-val=\"{{ false }}\">\n        <div>\n          <div style=\"display:flex;align-items:baseline;gap:12px;margin-bottom:14px\">\n            <h2 style=\"font-size:17px;font-weight:700\">Calendário Editorial<\u002Fh2>\n            <span style=\"font-size:12px;color:var(--ink-dim)\">vitrine Microsoft Lists · gerado na conclusão<\u002Fspan>\n          <\u002Fdiv>\n          <sc-if value=\"{{ showNotes }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:var(--note-bg);border:1px dashed var(--note-bd);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--note);margin-bottom:14px;display:flex;gap:9px\"><span style=\"font-weight:700\">◈ UX<\u002Fspan><span><strong>Transparência sem esforço.<\u002Fstrong> Cada chamado concluído vira um card aqui automaticamente (<span style=\"font-family:var(--mono)\">hook:done<\u002Fspan>) — gestores enxergam o que foi publicado, quando, em qual canal e a categoria, sem pedir relatório a ninguém.<\u002Fspan><\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ hasCal }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden\">\n              <div style=\"display:grid;grid-template-columns:120px 1fr 150px 150px;background:var(--surface-2);border-bottom:1px solid var(--border);font-size:11px;font-weight:700;color:var(--ink-dim);text-transform:uppercase;letter-spacing:.04em\">\n                <div style=\"padding:10px 14px\">Data<\u002Fdiv><div style=\"padding:10px 14px\">Conteúdo<\u002Fdiv><div style=\"padding:10px 14px\">Canal<\u002Fdiv><div style=\"padding:10px 14px\">Categoria<\u002Fdiv>\n              <\u002Fdiv>\n              <sc-for list=\"{{ calendar }}\" as=\"c\" hint-placeholder-count=\"0\">\n                <div style=\"display:grid;grid-template-columns:120px 1fr 150px 150px;border-bottom:1px solid var(--border);font-size:13px;align-items:center\">\n                  <div style=\"padding:11px 14px;font-family:var(--mono);font-size:12px;color:var(--ink-dim)\">{{ c.data }}<\u002Fdiv>\n                  <div style=\"padding:11px 14px\"><span style=\"font-weight:600\">{{ c.titulo }}<\u002Fspan><span style=\"display:block;font-size:11px;color:var(--ink-faint);font-family:var(--mono)\">{{ c.protocolo }} · {{ c.concessao }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"padding:11px 14px\"><span style=\"background:var(--violet-l);color:var(--violet-d);border-radius:6px;padding:3px 9px;font-size:11.5px;font-weight:600\">{{ c.canal }}<\u002Fspan><\u002Fdiv>\n                  <div style=\"padding:11px 14px;font-size:12px;color:var(--ink-dim)\"><span style=\"font-family:var(--mono);font-weight:700;color:var(--emerald)\">{{ c.cat }}d<\u002Fspan> · {{ c.catNome }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noCal }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"background:var(--surface);border:1px dashed var(--border-2);border-radius:10px;padding:50px;text-align:center;color:var(--ink-faint)\">\n              <div style=\"font-size:32px;margin-bottom:8px\">🗓<\u002Fdiv>Nenhuma publicação ainda. Conclua um chamado na <strong style=\"color:var(--violet)\">Esteira<\u002Fstrong> para gerar o primeiro card.\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fmain>\n\n    <!-- ====== RIGHT RAIL · HOOKS ====== -->\n    <aside style=\"background:var(--surface);border-left:1px solid var(--border);min-height:calc(100vh - 48px);padding:18px 16px;position:sticky;top:48px;display:flex;flex-direction:column;gap:16px\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:10px\">\n          <span style=\"width:8px;height:8px;border-radius:50%;background:var(--emerald);animation:hk 2s infinite\"><\u002Fspan>\n          <span style=\"font-weight:700;font-size:13px\">Automações · Bot de Hooks<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:6px\">\n          <sc-for list=\"{{ hooks }}\" as=\"h\" hint-placeholder-count=\"8\">\n            <div style=\"display:flex;gap:9px;align-items:flex-start;padding:7px 9px;border:1px solid {{ h.border }};background:{{ h.bg }};border-radius:7px\">\n              <span style=\"width:7px;height:7px;border-radius:50%;background:{{ h.dot }};margin-top:5px;flex:none\"><\u002Fspan>\n              <div style=\"flex:1\"><div style=\"font-family:var(--mono);font-size:11px;color:var(--violet-d);font-weight:500\">{{ h.id }}<\u002Fdiv><div style=\"font-size:11px;color:var(--ink-dim);line-height:1.4;margin-top:1px\">{{ h.desc }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"border-top:1px solid var(--border);padding-top:14px;flex:1;display:flex;flex-direction:column;min-height:0\">\n        <div style=\"font-weight:700;font-size:12.5px;margin-bottom:8px;display:flex;align-items:center;gap:7px\">Log de eventos <span style=\"font-family:var(--mono);font-size:10px;color:var(--ink-faint);font-weight:400\">live<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:5px;overflow:auto;max-height:300px\">\n          <sc-for list=\"{{ log }}\" as=\"e\" hint-placeholder-count=\"0\">\n            <div style=\"font-family:var(--mono);font-size:10.5px;line-height:1.4;padding:6px 8px;background:var(--surface-2);border-left:2px solid {{ e.color }};border-radius:0 5px 5px 0\">\n              <span style=\"color:var(--ink-faint)\">{{ e.time }}<\u002Fspan> <span style=\"color:{{ e.color }};font-weight:700\">{{ e.hook }}<\u002Fspan><br><span style=\"color:var(--ink-dim)\">{{ e.msg }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <sc-if value=\"{{ noLog }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"font-size:11px;color:var(--ink-faint);padding:10px 4px\">Os disparos do bot aparecem aqui conforme os chamados andam na esteira.<\u002Fdiv><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Faside>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showNotesDefault&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    tab:'bot', day:0, showNotes:true,\n    fTitulo:'', fCat:'5', fConcessao:'Bahia Norte', fCanal:'Redes Sociais', fBriefing:'', fUrgente:false,\n    tickets:[], thread:[], calendar:[], log:[], seq:7\n  };\n\n  CATS = [\n    { id:'2', dias:2, nome:'Operacional / Distribuição', desc:'Envio de info ou ajustes rápidos em material existente.' },\n    { id:'3', dias:3, nome:'Comunicação simples / Informativa', desc:'Execução rápida, sem criação visual complexa.' },\n    { id:'5', dias:5, nome:'Criação e Design', desc:'Layout, redação publicitária e Manual de Marca.' },\n    { id:'10', dias:10, nome:'Produção AV e Identidade estruturada', desc:'Roteiro + aprovação de texto + pós-produção.' },\n    { id:'15', dias:15, nome:'Projetos e campanhas integradas', desc:'Alto impacto, múltiplos canais, conceito unificado.' }\n  ];\n  CONCESSOES = ['Monte Rodovias','Bahia Norte','Litoral Norte','Rota do Atlântico','Rota dos Coqueiros'];\n  CANAIS = ['Redes Sociais','E-mail','TV Corporativa','Somos Monte','LinkedIn','Imprensa'];\n  STAGES = [\n    { name:'Triagem', dot:'#8a8f9c' }, { name:'Produção', dot:'#5b5fc7' },\n    { name:'Aprovação', dot:'#c8791a' }, { name:'Ajustes', dot:'#9061d6' },\n    { name:'On Hold', dot:'#c4314b' }, { name:'Concluído', dot:'#237b4b' }\n  ];\n  HOOKS = [\n    { id:'hook:intake', desc:'Recebe o chamado no Telegram e valida o briefing mínimo.' },\n    { id:'hook:register', desc:'Cria o card, categoriza e inicia o SLA (corte 16h).' },\n    { id:'hook:triagem', desc:'Briefing incompleto → devolve e congela o SLA.' },\n    { id:'hook:sla', desc:'Conta o prazo; alerta em D-2, D-1 e estouro.' },\n    { id:'hook:approval', desc:'1ª versão; 24h p/ retorno; +2d sem resposta → On Hold.' },\n    { id:'hook:adjust', desc:'Ciclo de ajustes em até 2 dias úteis.' },\n    { id:'hook:done', desc:'DoD ok → conclui e gera card no Calendário Editorial.' },\n    { id:'hook:urgent', desc:'Exceção validada via Telegram; reprioriza a fila.' }\n  ];\n\n  cat(id){ return this.CATS.find(c=>c.id===id) || this.CATS[2]; }\n  now(){ return new Date(Date.now()+this.state.day*864e5); }\n  fmt(d){ return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0'); }\n  clock(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0'); }\n\n  fire(hook, msg, color){\n    const e = { time:this.clock(), hook, msg, color:color||'var(--violet)' };\n    this.setState(s=>({ log:[e, ...s.log].slice(0,40) }));\n  }\n\n  componentDidMount(){\n    // Telegram Mini App init (no-op fora do Telegram)\n    try{ const tg=window.Telegram&&window.Telegram.WebApp; if(tg){ tg.ready(); tg.expand(); tg.setHeaderColor&&tg.setHeaderColor('#229ED9'); } }catch(e){}\n    // seed board\n    const mk = (n,t,cat,conc,canal,stage,left,urg)=>({ id:n, protocolo:'MEND-26-'+String(n).padStart(3,'0'), titulo:t, cat, concessao:conc, canal, stage, left, urgente:!!urg });\n    this.setState({ tickets:[\n      mk(1,'Comunicado de manutenção — Sistema CCO','2','Litoral Norte','E-mail','Triagem',2,false),\n      mk(2,'Release pós-evento Maio Amarelo','3','Bahia Norte','Imprensa','Produção',2,false),\n      mk(3,'Banner cabines — nova tarifa','5','Rota do Atlântico','TV Corporativa','Aprovação',1,false),\n      mk(4,'Vídeo institucional 20 anos','10','Monte Rodovias','LinkedIn','Ajustes',3,false),\n      mk(5,'Campanha SIPAT 2026 (pacote)','15','Rota dos Coqueiros','Redes Sociais','Produção',0,true),\n      mk(6,'Atualização de arte — vagas','2','Bahia Norte','LinkedIn','On Hold',1,false)\n    ]});\n  }\n\n  setTab(t){ this.setState({ tab:t }); }\n  toggleNotes(){ this.setState(s=>({ showNotes:!s.showNotes })); }\n  stepDay(){\n    this.setState(s=>{\n      const tickets = s.tickets.map(t=> (t.stage==='Concluído'||t.stage==='On Hold'||t.stage==='Triagem') ? t : ({...t, left:t.left-1}));\n      return { day:s.day+1, tickets };\n    });\n    this.fire('hook:sla', 'Tick D+'+(this.state.day+1)+' — relógios de SLA recalculados.', 'var(--ok)');\n  }\n\n  openTicket(){\n    const st=this.state;\n    if(!st.fTitulo.trim()){ this.fire('hook:intake','Bloqueado: título ausente.', 'var(--breach)'); return; }\n    if(st.fBriefing.trim().length<12){ this.fire('hook:triagem','Briefing insuficiente — chamado devolvido (SLA não inicia).', 'var(--breach)'); return; }\n    const c=this.cat(st.fCat); const n=st.seq+1;\n    const protocolo='MEND-26-'+String(n).padStart(3,'0');\n    const after16 = new Date().getHours()>=16;\n    const tk={ id:n, protocolo, titulo:st.fTitulo.trim(), cat:c.id, concessao:st.fConcessao, canal:st.fCanal, stage:'Triagem', left:c.dias, urgente:st.fUrgente };\n    const deadlineDate=new Date(Date.now()+(c.dias+(after16?1:0))*864e5);\n    const msg={ protocolo, titulo:tk.titulo, cat:c.id, catNome:c.nome, concessao:st.fConcessao, deadline:this.fmt(deadlineDate), urgente:st.fUrgente,\n      note: (after16?'Aberto após as 16h — SLA inicia no próximo dia útil. ':'')+'Está em Triagem; o SLA começa a contar quando o briefing for validado.'+(st.fUrgente?' Urgência sinalizada: valide via Telegram com a equipe.':'') };\n    this.setState(s=>({ tickets:[tk, ...s.tickets], thread:[msg, ...s.thread], seq:n, fTitulo:'', fBriefing:'', fUrgente:false }));\n    this.fire('hook:intake', protocolo+' recebido no Teams.', 'var(--violet)');\n    this.fire('hook:register', protocolo+' registrado · '+c.dias+'d · '+st.fConcessao, 'var(--violet)');\n    if(st.fUrgente) this.fire('hook:urgent', protocolo+' marcado como URGENTE — repriorização da fila.', 'var(--breach)');\n  }\n\n  move(id, to, hook, msg, color){\n    this.setState(s=>({ tickets:s.tickets.map(t=>{\n      if(t.id!==id) return t;\n      const nt={...t, stage:to};\n      if(to==='Produção' && t.stage==='Triagem') nt.left=this.cat(t.cat).dias;\n      if(to==='Ajustes') nt.left=2;\n      return nt;\n    })}));\n    const tk=this.state.tickets.find(t=>t.id===id);\n    this.fire(hook, (tk?tk.protocolo:'')+' '+msg, color);\n    if(to==='Concluído' && tk){\n      const c=this.cat(tk.cat);\n      const item={ protocolo:tk.protocolo, titulo:tk.titulo, concessao:tk.concessao, canal:tk.canal, cat:c.id, catNome:c.nome, data:this.fmt(this.now()) };\n      this.setState(s=>({ calendar:[item, ...s.calendar] }));\n      this.fire('hook:done', tk.protocolo+' → card gerado no Calendário Editorial.', 'var(--ok)');\n    }\n  }\n\n  slaInfo(t){\n    if(t.stage==='Concluído') return { color:'var(--ok)', tag:'✓ entregue' };\n    if(t.stage==='On Hold') return { color:'#c4314b', tag:'⏸ congelado' };\n    if(t.stage==='Triagem') return { color:'#8a8f9c', tag:'SLA n/ iniciado' };\n    if(t.left<0) return { color:'var(--breach)', tag:'estourou '+Math.abs(t.left)+'d' };\n    if(t.left===0) return { color:'var(--breach)', tag:'vence hoje' };\n    if(t.left===1) return { color:'var(--warn)', tag:'D-1' };\n    return { color:'var(--ok)', tag:t.left+'d restantes' };\n  }\n\n  actionsFor(t){\n    const A=(label,to,hook,msg,color,style)=>({ label, to, hook, msg, color, style, fn:()=>this.move(t.id,to,hook,msg,color) });\n    const prim={bg:'var(--violet)',color:'#fff',border:'var(--violet)'};\n    const ghost={bg:'var(--surface-2)',color:'var(--ink-dim)',border:'var(--border-2)'};\n    const warn={bg:'var(--warn-l)',color:'var(--warn)',border:'#eccfa0'};\n    const ok={bg:'var(--ok-l)',color:'var(--ok)',border:'#b6ddc4'};\n    let list=[];\n    if(t.stage==='Triagem') list=[A('✓ Briefing ok →','Produção','hook:triagem','briefing validado, SLA iniciado.','var(--violet)',prim), A('Devolver','On Hold','hook:triagem','devolvido — briefing incompleto.','var(--breach)',ghost)];\n    else if(t.stage==='Produção') list=[A('Enviar p/ aprovação →','Aprovação','hook:approval','1ª versão enviada — 24h p/ retorno.','var(--warn)',prim)];\n    else if(t.stage==='Aprovação') list=[A('Aprovar →','Concluído','hook:approval','aprovado pelo solicitante.','var(--ok)',ok), A('Pedir ajustes','Ajustes','hook:adjust','ajustes solicitados (2d).','#9061d6',warn), A('On Hold','On Hold','hook:approval','sem retorno 2d — SLA congelado.','var(--breach)',ghost)];\n    else if(t.stage==='Ajustes') list=[A('Reenviar →','Aprovação','hook:adjust','ajuste concluído, reenviado.','var(--warn)',prim)];\n    else if(t.stage==='On Hold') list=[A('Retomar','Aprovação','hook:approval','retomado pelo solicitante.','var(--ok)',prim)];\n    return list.map(a=>({ label:a.label, fn:a.fn, bg:a.style.bg, color:a.style.color, border:a.style.border }));\n  }\n\n  renderVals(){\n    const st=this.state;\n    const tabBg=on=>on?'#fff':'transparent';\n    const tabCol=on=>on?'var(--violet)':'#fff';\n    const active=st.tickets.filter(t=>t.stage!=='Concluído').length;\n    const tabs=[['bot','Mensagem','✈️',0],['board','Esteira','▦',active],['cal','Calendário','🗓',st.calendar.length]].map(([id,label,icon,count])=>({\n      label, icon, count: count||'', sel:()=>this.setTab(id), bg:tabBg(st.tab===id), color:tabCol(st.tab===id),\n      badgeBg: st.tab===id?'var(--violet-l)':'rgba(255,255,255,.25)', badgeColor: st.tab===id?'var(--violet-d)':'#fff'\n    }));\n\n    const c=this.cat(st.fCat);\n    const briefOk=st.fBriefing.trim().length>=12;\n    const catOptions=this.CATS.map(x=>({ ...x, active:x.id===st.fCat, sel:()=>this.setState({fCat:x.id}),\n      bg:x.id===st.fCat?'var(--violet-l)':'var(--surface-2)', border:x.id===st.fCat?'var(--violet)':'var(--border-2)',\n      numColor:x.id===st.fCat?'var(--violet-d)':'var(--ink-dim)' }));\n\n    const columns=this.STAGES.map(s=>{\n      const tk=st.tickets.filter(t=>t.stage===s.name).map(t=>{ const si=this.slaInfo(t); return {\n        protocolo:t.protocolo, titulo:t.titulo, cat:t.cat, concessao:t.concessao, urgente:t.urgente,\n        slaColor:si.color, slaTag:si.tag, actions:this.actionsFor(t) }; });\n      return { name:s.name, dot:s.dot, n:tk.length, tickets:tk, empty:tk.length===0 };\n    });\n\n    const calendar=st.calendar;\n    const hooksActive=new Set(st.log.map(l=>l.hook));\n    const hooks=this.HOOKS.map(h=>({ ...h, dot:hooksActive.has(h.id)?'var(--emerald)':'var(--border-2)',\n      bg:hooksActive.has(h.id)?'var(--emerald-l)':'var(--surface-2)', border:hooksActive.has(h.id)?'#bfe3cd':'var(--border)' }));\n\n    return {\n      tabs, day:st.day, isBot:st.tab==='bot', isBoard:st.tab==='board', isCal:st.tab==='cal',\n      showNotes:st.showNotes, toggleNotes:()=>this.toggleNotes(), stepDay:()=>this.stepDay(),\n      notesBtnBg: st.showNotes?'#fff':'rgba(255,255,255,.15)', notesBtnColor: st.showNotes?'var(--violet)':'#fff',\n      fTitulo:st.fTitulo, fBriefing:st.fBriefing, fUrgente:st.fUrgente,\n      onTitulo:e=>this.setState({fTitulo:e.target.value}), onBriefing:e=>this.setState({fBriefing:e.target.value}),\n      onConcessao:e=>this.setState({fConcessao:e.target.value}), onCanal:e=>this.setState({fCanal:e.target.value}),\n      onUrgente:e=>this.setState({fUrgente:e.target.checked}),\n      catOptions, concessoes:this.CONCESSOES, canais:this.CANAIS,\n      slaPreview:c.dias+' dias úteis', briefHint: briefOk?'Briefing suficiente para abrir.':'Mínimo de 12 caracteres — o bot bloqueia briefings vazios na entrada.',\n      briefHintColor: briefOk?'var(--ok)':'var(--ink-faint)',\n      urgBg: st.fUrgente?'var(--breach-l)':'var(--surface-2)', urgBorder: st.fUrgente?'#eab8c2':'var(--border-2)', urgInk: st.fUrgente?'var(--breach)':'var(--ink)',\n      openTicket:()=>this.openTicket(),\n      thread:st.thread,\n      columns, ticketCount:active,\n      calendar, hasCal:calendar.length>0, noCal:calendar.length===0,\n      hooks, log:st.log, noLog:st.log.length===0\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
